<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Horizon | Luxury Bookings</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark: #1a1a1a;
            --white: #ffffff;
        }
        body {
            font-family: 'Georgia', serif;
            background-color: var(--dark);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .booking-card {
            background: #222;
            padding: 2rem;
            border-radius: 15px;
            border: 1px solid var(--gold);
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { color: var(--gold); margin-bottom: 0.5rem; }
        p { font-size: 0.9rem; margin-bottom: 2rem; opacity: 0.8; }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--gold);
            border: none;
            color: black;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.3s;
        }
        button:hover { background: #f1c40f; }
        #status { margin-top: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="booking-card">
    <h2>Grand Horizon</h2>
    <p>Penthouse Suite - $15,000 / Night</p>
    
    <input type="text" placeholder="Full Name" id="name">
    <input type="text" placeholder="Check-in Date" onfocus="(this.type='date')">
    <input type="text" placeholder="Black Card Number (Any keys work)" id="card">
    
    <button onclick="processPayment()">CONFIRM BOOKING</button>
    
    <div id="status"></div>
</div>

<script>
    function processPayment() {
        const status = document.getElementById('status');
        const name = document.getElementById('name').value;
        
        if(!name) {
            status.innerText = "Please enter a name, Excellency.";
            return;
        }

        status.style.color = "var(--gold)";
        status.innerText = "Verifying Funds...";

        setTimeout(() => {
            status.innerHTML = `✅ Payment Accepted!<br>Welcome back, ${name}.<br>The Penthouse is ready.`;
        }, 2000);
    }
</script>

</body>
</html>
